<html><head><base href="https://ai-japanese-learning.example.com/">
<meta charset="UTF-8">
<title>500 - Server Error | AI-Powered Japanese Learning Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
:root {
  --primary: #ff6b6b;
  --secondary: #4ecdc4;
  --dark: #2c3e50;
  --light: #f7f9fc;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Noto Sans JP', sans-serif;
}

body {
  background: var(--light);
  color: var(--dark);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.error-container {
  text-align: center;
  padding: 2rem;
  position: relative;
  z-index: 1;
}

.error-code {
  font-size: 120px;
  color: var(--primary);
  font-weight: bold;
  text-shadow: 2px 2px 0 var(--secondary);
  margin-bottom: 1rem;
}

.error-message {
  font-size: 24px;
  margin-bottom: 2rem;
}

.japanese-error {
  font-size: 28px;
  color: var(--dark);
  margin-bottom: 2rem;
}

.error-description {
  font-size: 18px;
  color: var(--dark);
  margin-bottom: 2rem;
  max-width: 600px;
  line-height: 1.6;
}

.btn-home {
  background: var(--primary);
  color: white;
  border: none;
  padding: 1rem 2rem;
  border-radius: 25px;
  text-decoration: none;
  font-size: 18px;
  transition: all 0.3s ease;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  margin: 0.5rem;
}

.btn-home:hover {
  background: var(--secondary);
  transform: translateY(-2px);
}

.server-illustration {
  width: 300px;
  height: 200px;
  margin: 2rem auto;
}

.gear {
  transform-origin: center;
  transform-box: fill-box;
}

.sparks {
  position: absolute;
  pointer-events: none;
}

.binary-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  opacity: 0.1;
  z-index: -1;
}

</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="error-container">
  <div class="error-code">500</div>
  <div class="japanese-error">サーバーエラーが発生しました</div>
  <div class="error-message">Our server is taking a quick meditation break!</div>
  <div class="error-description">申し訳ありません (We apologize) - Our digital zen garden is experiencing some technical difficulties. Please try again in a few moments.</div>
  
  <svg class="server-illustration" viewBox="0 0 200 140">
    <rect x="40" y="20" width="120" height="100" rx="10" fill="var(--dark)"/>
    <rect x="50" y="30" width="100" height="80" rx="5" fill="var(--light)"/>
    <circle class="gear" cx="80" cy="70" r="20" fill="var(--primary)"/>
    <circle class="gear" cx="120" cy="70" r="20" fill="var(--secondary)"/>
    <path class="gear" d="M80,60 L80,80 M70,70 L90,70" stroke="var(--dark)" stroke-width="4"/>
    <path class="gear" d="M120,60 L120,80 M110,70 L130,70" stroke="var(--dark)" stroke-width="4"/>
    <circle cx="160" cy="40" r="3" fill="var(--primary)" class="status-light"/>
    <circle cx="160" cy="55" r="3" fill="var(--secondary)" class="status-light"/>
  </svg>
  
  <div>
    <a href="/" class="btn-home">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      Return Home
    </a>
    <a href="javascript:location.reload()" class="btn-home">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      Try Again
    </a>
  </div>
</div>

<canvas class="binary-bg"></canvas>

<script>
// Binary background animation
const canvas = document.querySelector('.binary-bg');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const binary = ['0', '1', '何', '語', '日'];
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function drawBinary() {
  ctx.fillStyle = 'rgba(247, 249, 252, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  ctx.fillStyle = '#2c3e50';
  ctx.font = `${fontSize}px 'Noto Sans JP'`;
  
  for(let i = 0; i < drops.length; i++) {
    const text = binary[Math.floor(Math.random() * binary.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
    
    if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }
    drops[i]++;
  }
}

setInterval(drawBinary, 33);

// Animations
gsap.from('.error-code', {
  y: -100,
  opacity: 0,
  duration: 1,
  ease: 'bounce.out'
});

gsap.from('.japanese-error', {
  y: 50,
  opacity: 0,
  duration: 0.8,
  delay: 0.3
});

gsap.from('.error-message, .error-description', {
  y: 50,
  opacity: 0,
  duration: 0.8,
  delay: 0.6,
  stagger: 0.2
});

gsap.from('.server-illustration', {
  scale: 0,
  opacity: 0,
  duration: 1,
  delay: 0.9,
  ease: 'elastic.out(1, 0.5)'
});

gsap.from('.btn-home', {
  y: 30,
  opacity: 0,
  duration: 0.8,
  delay: 1.2,
  stagger: 0.2
});

// Animate gears
gsap.to('.gear', {
  rotation: 360,
  duration: 4,
  repeat: -1,
  ease: 'none'
});

// Status lights blinking
gsap.to('.status-light', {
  opacity: 0.3,
  duration: 0.5,
  repeat: -1,
  yoyo: true,
  stagger: 0.2
});

// Create sparks animation
function createSpark() {
  const spark = document.createElement('div');
  spark.className = 'sparks';
  spark.style.position = 'absolute';
  spark.style.width = '2px';
  spark.style.height = '2px';
  spark.style.background = 'var(--primary)';
  document.querySelector('.server-illustration').appendChild(spark);
  
  gsap.to(spark, {
    x: Math.random() * 200 - 100,
    y: Math.random() * 200 - 100,
    opacity: 0,
    duration: Math.random() * 1 + 0.5,
    onComplete: () => spark.remove()
  });
}

setInterval(createSpark, 1000);

</script>

</body>
</html>
