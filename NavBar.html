<html><head><base href="https://ai-japanese-learning.example.com/">
<meta charset="UTF-8">
<title>AI-Powered Japanese Learning Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
:root {
  --primary: #ff6b6b;
  --secondary: #4ecdc4;
  --dark: #2c3e50;
  --light: #f7f9fc;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Noto Sans JP', sans-serif;
}

body {
  background: var(--light);
  color: var(--dark);
}

/* Navigation Bar Styles */
.nav-container {
  background: var(--dark);
  padding: 1rem 2rem;
  position: fixed;
  width: 100%;
  top: 0;
  z-index: 1000;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.nav-content {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  display: flex;
  align-items: center;
  gap: 1rem;
  color: white;
  text-decoration: none;
}

.logo svg {
  width: 32px;
  height: 32px;
}

.nav-links {
  display: flex;
  gap: 2rem;
  align-items: center;
}

.nav-link {
  color: white;
  text-decoration: none;
  padding: 0.5rem 1rem;
  border-radius: 4px;
  transition: background 0.3s ease;
}

.nav-link:hover {
  background: rgba(255,255,255,0.1);
}

.login-btn {
  background: var(--primary);
  color: white;
  padding: 0.5rem 1.5rem;
  border-radius: 25px;
  border: none;
  cursor: pointer;
  transition: transform 0.3s ease, background 0.3s ease;
}

.login-btn:hover {
  background: var(--secondary);
  transform: translateY(-2px);
}

/* Login Modal Styles */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 2000;
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: white;
  padding: 2rem;
  border-radius: 15px;
  width: 90%;
  max-width: 400px;
  position: relative;
}

.close-modal {
  position: absolute;
  top: 1rem;
  right: 1rem;
  background: none;
  border: none;
  font-size: 1.5rem;
  cursor: pointer;
  color: var(--dark);
}

.login-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.form-group input {
  padding: 0.8rem;
  border: 1px solid #ddd;
  border-radius: 4px;
  font-size: 1rem;
}

.submit-btn {
  background: var(--primary);
  color: white;
  padding: 0.8rem;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 1rem;
  transition: background 0.3s ease;
}

.submit-btn:hover {
  background: var(--secondary);
}

/* Adjust container padding for fixed navbar */
.container {
  max-width: 1200px;
  margin: 80px auto 0; /* Added top margin to account for fixed navbar */
  padding: 2rem;
}

/* Rest of your existing styles... */

</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Navigation Bar -->
<nav class="nav-container">
  <div class="nav-content">
    <a href="/" class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
      <span>日本語 Learning</span>
    </a>
    <div class="nav-links">
      <a href="/lessons" class="nav-link">Lessons</a>
      <a href="/practice" class="nav-link">Practice</a>
      <a href="/community" class="nav-link">Community</a>
      <button class="login-btn" onclick="openLoginModal()">Login</button>
    </div>
  </div>
</nav>

<!-- Login Modal -->
<div class="modal" id="loginModal">
  <div class="modal-content">
    <button class="close-modal" onclick="closeLoginModal()">×</button>
    <h2>Login to Your Account</h2>
    <form class="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit" class="submit-btn">Login</button>
      <p style="text-align: center; margin-top: 1rem;">
        Don't have an account? <a href="/signup" style="color: var(--primary);">Sign up</a>
      </p>
    </form>
  </div>
</div>

<!-- Rest of your existing content... -->
<header>
  <h1>AI-Powered Japanese Learning Platform</h1>
  <p>はじめましょう！ (Let's begin!)</p>
</header>

<!-- Your existing content here... -->

<script>
// Login Modal Functions
function openLoginModal() {
  const modal = document.getElementById('loginModal');
  modal.style.display = 'flex';
  gsap.from('.modal-content', {
    y: -50,
    opacity: 0,
    duration: 0.5,
    ease: 'power2.out'
  });
}

function closeLoginModal() {
  const modal = document.getElementById('loginModal');
  gsap.to('.modal-content', {
    y: -50,
    opacity: 0,
    duration: 0.3,
    ease: 'power2.in',
    onComplete: () => {
      modal.style.display = 'none';
      gsap.set('.modal-content', { y: 0, opacity: 1 });
    }
  });
}

function handleLogin(event) {
  event.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  
  // Here you would typically make an API call to your backend
  console.log('Login attempted with:', { email, password });
  
  // Mock successful login
  alert('Login successful!');
  closeLoginModal();
}

// Close modal when clicking outside
window.onclick = function(event) {
  const modal = document.getElementById('loginModal');
  if (event.target === modal) {
    closeLoginModal();
  }
}

// Add scroll animation for navbar
let lastScroll = 0;
window.addEventListener('scroll', () => {
  const navbar = document.querySelector('.nav-container');
  const currentScroll = window.pageYOffset;
  
  if (currentScroll <= 0) {
    navbar.style.boxShadow = '0 2px 5px rgba(0,0,0,0.1)';
  } else if (currentScroll > lastScroll) {
    navbar.style.transform = 'translateY(-100%)';
  } else {
    navbar.style.transform = 'translateY(0)';
    navbar.style.boxShadow = '0 2px 5px rgba(0,0,0,0.2)';
  }
  lastScroll = currentScroll;
});

// Your existing JavaScript code...

</script>

</body>
</html>
