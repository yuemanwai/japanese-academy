<html><head><base href="https://nihongo-chat.ai/" />
<meta charset="UTF-8">
<title>Japanese Conversation Simulator | AI Language Partner</title>
<style>
:root {
  --primary: #ff6b6b;
  --secondary: #4ecdc4;
  --accent: #ffe66d;
  --bg: #f7f7f7;
  --text: #2d3436;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'M PLUS Rounded 1c', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 2rem;
}

.chat-container {
  max-width: 800px;
  margin: 0 auto;
  background: white;
  border-radius: 20px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
  overflow: hidden;
}

.chat-header {
  background: var(--primary);
  color: white;
  padding: 1rem;
  text-align: center;
  position: relative;
}

.scene-info {
  background: var(--secondary);
  color: white;
  padding: 0.5rem;
  text-align: center;
  font-size: 0.9rem;
}

.chat-messages {
  height: 60vh;
  overflow-y: auto;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.message {
  max-width: 70%;
  padding: 1rem;
  border-radius: 15px;
  position: relative;
  animation: messagePopIn 0.3s ease forwards;
}

@keyframes messagePopIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.ai-message {
  background: #f0f0f0;
  align-self: flex-start;
  border-bottom-left-radius: 5px;
}

.user-message {
  background: var(--primary);
  color: white;
  align-self: flex-end;
  border-bottom-right-radius: 5px;
}

.message-text {
  margin-bottom: 0.5rem;
}

.message-translation {
  font-size: 0.8rem;
  opacity: 0.8;
  font-style: italic;
}

.response-options {
  padding: 1rem;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1rem;
  background: white;
}

.response-option {
  padding: 1rem;
  background: var(--secondary);
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.response-option:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 10px rgba(0,0,0,0.1);
}

.helper-text {
  position: absolute;
  top: -20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent);
  padding: 0.3rem 1rem;
  border-radius: 15px;
  font-size: 0.8rem;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.response-option:hover .helper-text {
  opacity: 1;
}

.level-indicator {
  position: absolute;
  right: 1rem;
  top: 1rem;
  background: var(--accent);
  padding: 0.3rem 0.8rem;
  border-radius: 15px;
  font-size: 0.8rem;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <h2>Japanese Conversation Simulator</h2>
    <div class="level-indicator">JLPT N5</div>
  </div>
  
  <div class="scene-info">
    Location: Café in Tokyo | Context: Ordering a drink
  </div>
  
  <div class="chat-messages" id="chatMessages">
    <!-- Messages will be dynamically added here -->
  </div>
  
  <div class="response-options" id="responseOptions">
    <!-- Response options will be dynamically added here -->
  </div>
</div>

<script>
const conversations = {
  start: {
    aiMessage: {
      japanese: "いらっしゃいませ！",
      english: "Welcome!",
      next: "greeting"
    },
    options: [
      {
        japanese: "こんにちは",
        english: "Hello",
        next: "greeting"
      },
      {
        japanese: "はじめまして",
        english: "Nice to meet you",
        next: "greeting"
      }
    ]
  },
  greeting: {
    aiMessage: {
      japanese: "ご注文は何にしますか？",
      english: "What would you like to order?",
      next: "order"
    },
    options: [
      {
        japanese: "コーヒーをお願いします",
        english: "Coffee please",
        next: "coffee"
      },
      {
        japanese: "お茶をお願いします",
        english: "Tea please",
        next: "tea"
      }
    ]
  },
  coffee: {
    aiMessage: {
      japanese: "ホットですか、アイスですか？",
      english: "Would you like hot or iced?",
      next: "temperature"
    },
    options: [
      {
        japanese: "ホットでお願いします",
        english: "Hot please",
        next: "confirmation"
      },
      {
        japanese: "アイスでお願いします",
        english: "Iced please",
        next: "confirmation"
      }
    ]
  }
};

let currentState = 'start';

function addMessage(message, isUser = false) {
  const messagesContainer = document.getElementById('chatMessages');
  const messageDiv = document.createElement('div');
  messageDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
  
  const messageText = document.createElement('div');
  messageText.className = 'message-text';
  messageText.textContent = message.japanese;
  
  const messageTranslation = document.createElement('div');
  messageTranslation.className = 'message-translation';
  messageTranslation.textContent = message.english;
  
  messageDiv.appendChild(messageText);
  messageDiv.appendChild(messageTranslation);
  messagesContainer.appendChild(messageDiv);
  messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

function updateOptions(options) {
  const optionsContainer = document.getElementById('responseOptions');
  optionsContainer.innerHTML = '';
  
  options.forEach(option => {
    const button = document.createElement('button');
    button.className = 'response-option';
    
    const helperText = document.createElement('span');
    helperText.className = 'helper-text';
    helperText.textContent = option.english;
    
    button.textContent = option.japanese;
    button.appendChild(helperText);
    
    button.onclick = () => selectOption(option);
    optionsContainer.appendChild(button);
  });
}

function selectOption(option) {
  addMessage(option, true);
  currentState = option.next;
  
  if (conversations[currentState]) {
    setTimeout(() => {
      addMessage(conversations[currentState].aiMessage);
      updateOptions(conversations[currentState].options);
    }, 1000);
  }
}

// Initialize conversation
addMessage(conversations.start.aiMessage);
updateOptions(conversations.start.options);
</script>
</body></html>
