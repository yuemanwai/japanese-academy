name: Dev Build Push YQ

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - develop

jobs:
  build-push-yq:
    name: Build Image, Push, and YQ
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
      IMAGE_REPO: fyp-jp-dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set build variables
        id: vars
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PAT || secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            docker.io/${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_REPO }}:${{ steps.vars.outputs.short_sha }}
            docker.io/${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_REPO }}:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install yq
        run: |
          wget -q https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64 -O ./yq
          chmod +x ./yq

      - name: Generate and validate image metadata using yq
        run: |
          cat > image-metadata.yaml <<EOF
          image:
            repository: docker.io/${DOCKER_USERNAME}/${IMAGE_REPO}
            tag: ${SHORT_SHA}
          git:
            sha: ${GITHUB_SHA}
            ref: ${GITHUB_REF}
          EOF

          ./yq e '.image.repository' image-metadata.yaml
          ./yq e '.image.tag' image-metadata.yaml
          ./yq e '.git.sha' image-metadata.yaml
