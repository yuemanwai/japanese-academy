name: Dev Build Push YQ

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - develop

jobs:
  build-push-yq:
    name: Build Image, Push, and YQ
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
      IMAGE_REPO: fyp-jp
      MANIFEST_REPO: ${{ vars.DEV_MANIFEST_REPO || 'yuemanwai/argocd-local' }}
      MANIFEST_BRANCH: ${{ vars.DEV_MANIFEST_BRANCH || 'main' }}
      MANIFEST_FILE: ${{ vars.DEV_MANIFEST_FILE || 'gitops/apps/jp/values.yaml' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set build variables
        id: vars
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PAT || secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            docker.io/${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_REPO }}:${{ steps.vars.outputs.short_sha }}
            docker.io/${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_REPO }}:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install yq
        run: |
          wget -q https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64 -O ./yq
          chmod +x ./yq

      - name: Checkout Manifest Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MANIFEST_REPO }}
          token: ${{ secrets.MANIFEST_REPO_PAT }}
          ref: ${{ env.MANIFEST_BRANCH }}
          path: manifest-repo

      - name: Update image tag using yq
        run: |
          target_file="manifest-repo/${MANIFEST_FILE}"
          if [ ! -f "$target_file" ]; then
            echo "Manifest file not found: $target_file"
            exit 1
          fi

          ./yq -i '.image.repository = "docker.io/'"${DOCKER_USERNAME}"'/'"${IMAGE_REPO}"'" | .image.tag = "'"${SHORT_SHA}"'"' "$target_file"
          echo "Updated manifest: $target_file"
          ./yq e '.image.repository' "$target_file"
          ./yq e '.image.tag' "$target_file"

      - name: Commit and push manifest changes
        run: |
          cd manifest-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "CI(dev): update image tag to ${SHORT_SHA}"
            git push origin "${MANIFEST_BRANCH}"
          else
            echo "No manifest changes to commit"
          fi
