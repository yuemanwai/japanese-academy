name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 程式碼安全掃描
      - name: Run Semgrep SAST scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/ci

      # Python 依賴漏洞掃描
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run dependency vulnerability scan
        run: |
          pip install safety
          safety scan --file requirements.txt

      # 秘密掃描
      - name: Run secret detection
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      security-events: write

    env:
      DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      DOCKER_HUB_PAT: ${{ secrets.DOCKER_HUB_PAT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Docker 建置設定
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: env.DOCKER_HUB_USERNAME != '' && env.DOCKER_HUB_PAT != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ env.DOCKER_HUB_PAT }}

      # 建置並推送 Docker 映像
      - name: Build and push Docker image
        if: env.DOCKER_HUB_USERNAME != '' && env.DOCKER_HUB_PAT != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/fyp-jp:latest
            ${{ env.DOCKER_HUB_USERNAME }}/fyp-jp:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Docker 映像安全掃描
      - name: Run Trivy vulnerability scan
        if: env.DOCKER_HUB_USERNAME != '' && env.DOCKER_HUB_PAT != ''
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: '${{ env.DOCKER_HUB_USERNAME }}/fyp-jp:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          scanners: 'vuln'

      - name: Upload Trivy scan results
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      # 阻止部署如果有嚴重漏洞
      - name: Check for critical vulnerabilities
        if: env.DOCKER_HUB_USERNAME != '' && env.DOCKER_HUB_PAT != ''
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: '${{ env.DOCKER_HUB_USERNAME }}/fyp-jp:latest'
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          scanners: 'vuln'
