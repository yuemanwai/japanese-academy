name: CI/CD Pipeline

on:
  push:
    # branches: ["main"] # 為了 Demo，保留 Push 觸發，但不限制分支
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]

jobs:
  # ====================================================
  # 階段一：安全掃描 (Demo 用，保留報告但不阻擋流水線)
  # ====================================================
  security-scan:
    name: Security Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # 用於上傳 SARIF 報告 (如需要)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. 程式碼靜態分析 (SAST)
      - name: Run Semgrep SAST scan
        uses: returntocorp/semgrep-action@v1
        continue-on-error: true
        with:
          config: p/ci

      # 2. 秘密掃描 (Push)
      - name: Run secret detection (push)
        uses: trufflesecurity/trufflehog@main
        if: github.event_name == 'push'
        continue-on-error: true
        with:
          path: ./
          base: ${{ github.event.before }} # 優化：只掃描新增的 Commits
          head: ${{ github.sha }}
          extra_args: --only-verified

      # 3. 秘密掃描 (PR)
      - name: Run secret detection (pull_request)
        uses: trufflesecurity/trufflehog@main
        if: github.event_name == 'pull_request'
        continue-on-error: true
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

  # ====================================================
  # 階段二：本機映像掃描 (Demo 用，不推送、不更新 Manifest)
  # ====================================================
  build-and-scan:
    name: Build & Scan Local Image
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read

    env:
      # 定義全局變數，方便下面引用
      IMAGE_NAME: demo-security/jp-academy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set temporary image tag
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # Docker 設定
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build local image only
      - name: Build local Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Image Scan (只做一次，直接 Fail HIGH/CRITICAL)
      # 為了 FYP 展示效果，我們可以分兩步：先 show table，再 check error
      - name: Install Trivy CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
          trivy --version

      - name: Trivy Scan (Report)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          skip-setup-trivy: true
          image-ref: "${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}"
          format: "table"
          scanners: "vuln"
          exit-code: "0" # 這裡不 Fail，只為了出報告給你看

      - name: Trivy Scan (Blocker)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          skip-setup-trivy: true
          image-ref: "${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}"
          format: "table"
          exit-code: "1" # 有問題就 Fail
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
          scanners: "vuln"

