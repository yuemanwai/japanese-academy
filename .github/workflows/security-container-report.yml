name: Security Report - Container Image

on:
  push:
    # branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  trivy-container-report:
    name: Trivy Container HTML Report
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: demo-security/jp-academy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set temporary image tag
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
          trivy --version

      - name: Set report date
        id: image_report_date
        run: echo "value=$(date +'%d-%m-%Y')" >> "$GITHUB_OUTPUT"

      - name: Verify Trivy template files
        run: |
          test -f "$GITHUB_WORKSPACE/.github/trivy.tpl"
          test -f "$GITHUB_WORKSPACE/.trivyignore"
          echo "Using template: $GITHUB_WORKSPACE/.github/trivy.tpl"
          echo "Using ignore file: $GITHUB_WORKSPACE/.trivyignore"

      - name: Generate Trivy container HTML report
        run: |
          trivy image "${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}" \
            --scanners vuln \
            --ignorefile "$GITHUB_WORKSPACE/.trivyignore" \
            --format template \
            --template "@$GITHUB_WORKSPACE/.github/trivy.tpl" \
            --output "trivy-container-report-${{ steps.image_report_date.outputs.value }}.html" \
            --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL \
            --exit-code 0

      - name: Upload Trivy container HTML artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-container-report-${{ steps.image_report_date.outputs.value }}
          path: trivy-container-report-${{ steps.image_report_date.outputs.value }}.html
          retention-days: 60
