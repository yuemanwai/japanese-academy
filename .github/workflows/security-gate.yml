name: Security Gate Pipeline

on:
  workflow_dispatch:
  push: {}
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]

jobs:
  # ====================================================
  # 階段一：安全掃描 (Demo 用，保留報告但不阻擋流水線)
  # ====================================================
  security-scan:
    name: Security Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # 用於上傳 SARIF 報告 (如需要)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. 程式碼靜態分析 (SAST)
      - name: Run Semgrep SAST scan
        uses: returntocorp/semgrep-action@v1
        continue-on-error: true
        with:
          config: p/ci

      # 2. 秘密掃描 (Push)
      - name: Run secret detection (push)
        uses: trufflesecurity/trufflehog@main
        if: github.event_name == 'push'
        continue-on-error: true
        with:
          path: ./
          base: ${{ github.event.before }} # 優化：只掃描新增的 Commits
          head: ${{ github.sha }}
          extra_args: --only-verified

      # 3. 秘密掃描 (PR)
      - name: Run secret detection (pull_request)
        uses: trufflesecurity/trufflehog@main
        if: github.event_name == 'pull_request'
        continue-on-error: true
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

  # ====================================================
  # 階段二：Production Build + Security Gate + Push
  # ====================================================
  build-and-deploy:
    name: Build, Scan and Push Image
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read

    env:
      IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME || secrets.DOCKERHUB_USERNAME }}/fyp-jp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set temporary image tag
        id: vars
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # Docker 設定
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
          trivy --version

      - name: Trivy Scan (Report)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          skip-setup-trivy: true
          image-ref: "${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }}"
          format: "table"
          scanners: "vuln"
          exit-code: "0"

      - name: Trivy Scan (Blocker)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          skip-setup-trivy: true
          image-ref: "${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }}"
          format: "table"
          exit-code: "1"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
          scanners: "vuln"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PAT || secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch images to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            docker.io/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }}
            docker.io/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Checkout Manifest Repo
        uses: actions/checkout@v4
        with:
          repository: yuemanwai/argocd-local
          token: ${{ secrets.MANIFEST_REPO_PAT }}
          path: manifest-repo

      - name: Update Image Tag using yq
        run: |
          wget https://github.com/mikefarah/yq/releases/download/v4.40.5/yq_linux_amd64 -O ./yq
          chmod +x ./yq
          ./yq -i '.image.repository = "docker.io/${{ env.IMAGE_NAME }}" | .image.tag = "${{ steps.vars.outputs.short_sha }}"' ./manifest-repo/gitops/apps/jp/values.yaml

      - name: Commit and Push Manifest changes
        run: |
          cd manifest-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "CI: Update image tag to ${{ steps.vars.outputs.short_sha }}"
            git push
          else
            echo "No manifest changes to commit"
          fi
