name: Dependabot Lockfile Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  sync-lockfiles:
    name: Compile requirements from .in
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Recompile lockfiles from .in
        run: |
          uv pip compile --python 3.10 requirements.in -o requirements.txt
          uv pip compile --python 3.10 requirements-dev.in -o requirements-dev.txt

      - name: Commit and push changes
        run: |
          if [ -n "$(git status --porcelain requirements.txt requirements-dev.txt)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add requirements.txt requirements-dev.txt
            git commit -m "chore: sync requirements lockfiles from .in"
            git push
          else
            echo "No lockfile changes to commit"
          fi
